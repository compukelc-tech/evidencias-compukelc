<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evidencias compukelc</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        
        <!-- PANTALLA DE INICIO DE SESIÓN -->
        <div id="login-section">
            <h2>Iniciar Sesión</h2>
            <input type="text" id="login-doc" class="input-field" placeholder="Documento o NIT" required>
            <input type="password" id="login-pass" class="input-field" placeholder="Contraseña" required>
            
            <div class="checkbox-wrapper" style="text-align: left; margin: 15px 0;">
                <input type="checkbox" id="recordar-datos">
                <label for="recordar-datos" style="display: inline; font-weight: normal; margin-left: 5px;">Guardar datos de acceso</label>
            </div>
            
            <button id="btn-login" class="submit-btn">Ingresar</button>
            <p style="margin-top: 15px;">¿No tienes cuenta? <a href="#" id="link-registro" style="color: #007bff;">Regístrate aquí</a></p>
        </div>

        <!-- PANTALLA DE REGISTRO -->
        <div id="register-section" style="display: none;">
            <h2>Registro de Contratista</h2>
            <input type="text" id="reg-nombre" class="input-field" placeholder="Nombre Completo" required>
            <input type="email" id="reg-correo" class="input-field" placeholder="Correo Electrónico" required>
            <input type="text" id="reg-doc" class="input-field" placeholder="Documento de Identidad o NIT" required>
            <input type="tel" id="reg-celular" class="input-field" placeholder="Número Celular" required>
            <input type="password" id="reg-pass" class="input-field" placeholder="Crear Contraseña" required>
            
            <button id="btn-registrar" class="submit-btn" style="background-color: #28a745;">Enviar Registro</button>
            <p style="margin-top: 15px;">¿Ya tienes cuenta? <a href="#" id="link-login" style="color: #007bff;">Inicia sesión</a></p>
        </div>

        <!-- PANTALLA PRINCIPAL (Oculta hasta que ingresen) -->
        <div id="app-section" style="display: none;">
            <h2>Subir Evidencia</h2>
            <p id="user-greeting" style="font-weight: bold; color: #333; margin-bottom: 15px;"></p>
            
            <label for="privacidad">Nivel de privacidad:</label>
            <select id="privacidad" class="input-field">
                <option value="Público">Público (Visible para todos)</option>
                <option value="Privado">Privado (Solo administración)</option>
            </select>

            <div class="camera-btn-wrapper">
                <label for="foto" class="camera-btn">📸 Tocar para tomar foto</label>
                <input type="file" id="foto" accept="image/*" capture="environment" style="display: none;">
            </div>
            <p id="file-name">Ninguna foto tomada aún.</p>

            <button id="btn-enviar" class="submit-btn" disabled>Subir Evidencia</button>
            <button id="btn-logout" class="submit-btn" style="margin-top: 15px; background-color: #dc3545;">Cerrar Sesión</button>
            <p id="status-message"></p>
        </div>

    </div>

    <script src="app.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js');
        });
      }
    </script>
</body>
</html>
